           <script>
             // Prevent duplicate AdSense initialization
             if (!window.adsenseInitialized) {
               window.adsenseInitialized = true;
               
               // Wait for AdSense script to load
               function initializeAdSense() {
                 if (window.adsbygoogle && window.adsbygoogle.loaded) {

                       const currentPath = window.location.pathname;
                       const adminPaths = ['/admin', '/admin-dashboard', '/admin-reports', '/admin-cleanup'];
                       const minimalContentPaths = ['/admin-reports', '/admin-cleanup'];
                       
                       // Skip ads on admin pages and minimal content pages

                       if (shouldShowAds) {

                         });

                       }
                     }

                     console.log('⚠️ AdSense initialization error:', error);
                   }
                 } else {
                   // Retry after a short delay
                   setTimeout(initializeAdSense, 200);

               // Initialize when DOM is ready

                 document.addEventListener('DOMContentLoaded', initializeAdSense);
               } else {

             }

    <!-- AdSense Auto Ads Guard -->
    <script>
      (function () {
        var publisherId = 'ca-pub-1908204778515307';
        var excludedPrefixes = [
          '/admin',
          '/login',
          '/signup',
          '/forgot-password',
          '/upload',
          '/dashboard',
          '/profile/edit',
          '/notifications',
          '/settings',
          '/privacy',
          '/terms',
          '/contact',
          '/report'
        ];

        function shouldShowAds() {
          var path = window.location.pathname;
          return !excludedPrefixes.some(function (prefix) {
            return path === prefix || path.indexOf(prefix + '/') === 0;
          });
        }

        function initializeAdSense() {
          if (!shouldShowAds() || window.adsenseAutoAdsEnabled) return;
          if (!window.adsbygoogle) {
            window.setTimeout(initializeAdSense, 250);
            return;
          }

          try {
            window.adsbygoogle = window.adsbygoogle || [];
            window.adsbygoogle.push({
              google_ad_client: publisherId,
              enable_page_level_ads: true
            });
            window.adsenseAutoAdsEnabled = true;
          } catch (error) {
            window.setTimeout(initializeAdSense, 500);
          }
        }

        if (document.readyState === 'loading') {
          document.addEventListener('DOMContentLoaded', initializeAdSense);
        } else {
          initializeAdSense();
        }
      })();
    </script>

    <!-- Enhanced Error Handling for Blocked Resources -->
    <script>
      // Handle blocked resources gracefully
      window.addEventListener('error', function(e) {
        if (e.message && e.message.includes('ERR_BLOCKED_BY_CLIENT')) {
          console.log('🛡️ Resource blocked by ad blocker - continuing normally');
          e.preventDefault();
          return false;
        }
      });
      
      // Handle Firebase App Check errors
      window.addEventListener('unhandledrejection', function(e) {
        if (e.reason && e.reason.message) {
          const message = e.reason.message.toLowerCase();
          
          if (message.includes('appcheck') || message.includes('recaptcha')) {
            console.log('🔥 Firebase App Check error handled gracefully');
            e.preventDefault();
            return;
          }
          
          if (message.includes('network') || message.includes('fetch')) {
            console.log('🌐 Network error handled gracefully');
            e.preventDefault();
            return;
          }
        }
      });
      
      // COMPREHENSIVE Google Analytics Blocking
      if (typeof window !== 'undefined') {
        // Block ALL Google Analytics requests
        const originalFetch = window.fetch;
        window.fetch = function(url, options) {
          if (typeof url === 'string' && (
            url.includes('google-analytics.com') ||
            url.includes('googletagmanager.com') ||
            url.includes('G-DVE3KJ3EWJ')
          )) {
            console.log('🛡️ Blocked Google Analytics fetch request:', url);
            return Promise.resolve(new Response('', { status: 200 }));
          }
          return originalFetch.apply(this, arguments);
        };
        
        // Block XMLHttpRequest
        const originalXHROpen = XMLHttpRequest.prototype.open;
        XMLHttpRequest.prototype.open = function(method, url, ...args) {
          if (typeof url === 'string' && (
            url.includes('google-analytics.com') ||
            url.includes('googletagmanager.com') ||
            url.includes('G-DVE3KJ3EWJ')
          )) {
            console.log('🛡️ Blocked Google Analytics XHR request:', url);
            this._blocked = true;
            return;
          }
          return originalXHROpen.apply(this, [method, url, ...args]);
        };
        
        const originalXHRSend = XMLHttpRequest.prototype.send;
        XMLHttpRequest.prototype.send = function(...args) {
          if (this._blocked) {
            console.log('🛡️ Blocked Google Analytics XHR send');
            return;
          }
          return originalXHRSend.apply(this, args);
        };
        
        // Override gtag completely
        window.gtag = function() {
          console.log('📊 Google Analytics blocked - continuing without tracking');
        };
        
        // Block any script loading with old GA ID
        const originalCreateElement = document.createElement;
        document.createElement = function(tagName) {
          const element = originalCreateElement.call(this, tagName);
          
          if (tagName.toLowerCase() === 'script') {
            const originalSetAttribute = element.setAttribute;
            element.setAttribute = function(name, value) {
              if (name === 'src' && value && typeof value === 'string') {
                // Block any script with old GA ID
                if (value.includes('G-DVE3KJ3EWJ') || 
                    value.includes('google-analytics.com') ||
                    value.includes('googletagmanager.com')) {
                  console.log('🛡️ Blocked Google Analytics script:', value);
                  return; // Don't set the src
                }
              }
              return originalSetAttribute.call(this, name, value);
            };
          }
          
          return element;
        };
        
        // Block inspector.js Google Analytics calls
        if (window.inspector) {
          const originalInspectorFetch = window.inspector.fetch;
          if (originalInspectorFetch) {
            window.inspector.fetch = function(url, options) {
              if (typeof url === 'string' && url.includes('google-analytics.com')) {
                console.log('🛡️ Blocked inspector.js Google Analytics request:', url);
                return Promise.resolve(new Response('', { status: 200 }));
              }
              return originalInspectorFetch.apply(this, arguments);
            };
          }
        }
      }
      
      // Handle Firebase logging blocking
      if (typeof window !== 'undefined' && window.firebase) {
        const originalLog = window.firebase.log || console.log;
        window.firebase.log = function(...args) {
          try {
            originalLog.apply(this, args);
          } catch (e) {
            if (e.message && e.message.includes('ERR_BLOCKED_BY_CLIENT')) {
              console.log('🔥 Firebase logging blocked - continuing without logs');
            }
          }
        };
      }
    </script>
